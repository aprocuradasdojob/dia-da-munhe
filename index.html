<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 de Março – Mulheres que movem o mundo</title>
    <style>
        :root {
            --roxo: #5B2C6F;
            --verde: #008000;
            --branco: #FFFFFF;
            --preto: #1A1A1A;
            --cinza-claro: #F4F4F4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            line-height: 1.6;
            color: var(--preto);
            background-color: var(--branco);
        }

        /* Acessibilidade e Contraste */
        a:focus, button:focus {
            outline: 3px solid var(--verde);
            outline-offset: 2px;
        }

        /* Header & Hero */
        .hero {
            height: 90vh;
            background: linear-gradient(rgba(91, 44, 111, 0.7), rgba(0, 128, 0, 0.4)), 
                        url('https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&q=80&w=1200') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--branco);
            padding: 2rem;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900;
            margin-bottom: 1.5rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .btn-cta {
            background-color: var(--verde);
            color: var(--branco);
            padding: 1.2rem 2.5rem;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            transition: transform 0.2s, background 0.3s;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
        }

        .btn-cta:hover {
            background-color: #006400;
            transform: scale(1.05);
        }

        /* Seções Gerais */
        section {
            padding: 4rem 10%;
        }

        h2 {
            color: var(--roxo);
            font-size: 2.2rem;
            margin-bottom: 2rem;
            border-left: 8px solid var(--verde);
            padding-left: 1rem;
        }

        /* Timeline */
        .timeline {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        .event-card {
            background: var(--cinza-claro);
            padding: 2rem;
            border-bottom: 5px solid var(--roxo);
        }

        .event-year {
            font-weight: 900;
            color: var(--verde);
            font-size: 1.5rem;
            display: block;
        }

        /* Dados */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .stat-item {
            background: var(--roxo);
            color: var(--branco);
            padding: 2rem;
            text-align: center;
            border-radius: 8px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            display: block;
            margin-bottom: 0.5rem;
        }

        /* Galeria */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .profile-card {
            border: 1px solid #ddd;
            padding: 1.5rem;
            transition: 0.3s;
        }

        .profile-card:hover {
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: var(--roxo);
        }

        .profile-card h3 {
            color: var(--roxo);
            margin-bottom: 0.5rem;
        }

        /* Ação */
        .actions-list {
            list-style: none;
        }

        .action-item {
            margin-bottom: 1.5rem;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }

        .action-icon {
            background: var(--verde);
            color: white;
            padding: 0.5rem;
            border-radius: 50%;
            min-width: 40px;
            text-align: center;
        }

        /* Download Section */
        .art-section {
            background: var(--cinza-claro);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            text-align: center;
        }

        .download-btn {
            background: var(--roxo);
            color: white;
            padding: 1rem;
            display: block;
            text-decoration: none;
            margin-top: 1rem;
            border-radius: 4px;
        }

        /* Footer */
        footer {
            background: var(--preto);
            color: var(--branco);
            padding: 3rem 10%;
        }

        .newsletter input {
            padding: 0.8rem;
            width: 100%;
            max-width: 300px;
